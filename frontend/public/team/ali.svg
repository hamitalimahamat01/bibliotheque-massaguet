<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="devGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cercle de fond -->
  <circle cx="100" cy="100" r="90" fill="url(#devGrad)" />
  
  <!-- Visage simplifié -->
  <circle cx="100" cy="85" r="35" fill="white" />
  
  <!-- Yeux -->
  <circle cx="85" cy="80" r="5" fill="#4f46e5" />
  <circle cx="115" cy="80" r="5" fill="#4f46e5" />
  
  <!-- Sourire -->
  <path d="M85 100 Q100 115 115 100" fill="none" stroke="#4f46e5" stroke-width="3" stroke-linecap="round" />
  
  <!-- Lunettes (pour le style développeur) -->
  <circle cx="85" cy="80" r="12" fill="none" stroke="#4f46e5" stroke-width="2.5" />
  <circle cx="115" cy="80" r="12" fill="none" stroke="#4f46e5" stroke-width="2.5" />
  <line x1="97" y1="80" x2="103" y2="80" stroke="#4f46e5" stroke-width="2.5" />
  
  <!-- Cheveux (style moderne) -->
  <path d="M65 75 Q70 50 90 45 Q100 40 110 45 Q130 50 135 75" fill="white" />
  
  <!-- Badge développeur -->
  <rect x="70" y="140" width="60" height="20" rx="10" fill="white" />
  <text x="100" y="154" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4f46e5" text-anchor="middle">&lt;/&gt;</text>
  
  <!-- Étoiles de décoration -->
  <circle cx="45" cy="55" r="3" fill="#fcd34d" />
  <circle cx="155" cy="55" r="3" fill="#fcd34d" />
  <circle cx="45" cy="145" r="3" fill="#fcd34d" />
  <circle cx="155" cy="145" r="3" fill="#fcd34d" />
</svg>
